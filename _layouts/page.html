---
# Layout para páginas estáticas con hero reducido
layout: default
---

<!-- Hero reducido de página interior -->
<section class="page-hero {% if page.unit_color %}page-hero--{{ page.unit_color }}{% endif %}" 
  style="{% if page.hero_image %}background-image: url('{{ page.hero_image | relative_url }}'); background-size: cover; background-position: center; position: relative; overflow: hidden;{% else if page.hero_color %}background: {{ page.hero_color }};{% endif %}">
  
  {% if page.hero_image %}
    <div style="position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 100%); z-index: 1;"></div>
  {% endif %}

  <div class="container page-hero__inner" style="position: relative; z-index: 2;">
    {% if page.icon %}<span class="page-hero__icon" aria-hidden="true">{{ page.icon }}</span>{% endif %}
    <h1 class="page-hero__title" style="{% if page.hero_image %}color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.3);{% endif %}">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-hero__subtitle" style="{% if page.hero_image %}color: rgba(255,255,255,0.9);{% endif %}">{{ page.subtitle }}</p>{% endif %}
  </div>
</section>

<!-- Contenido de la página -->
<article class="page-content">
  <div class="container">
    {{ content }}
  </div>
</article>
