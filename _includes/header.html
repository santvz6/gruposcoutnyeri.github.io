<!-- ============================================================
     _includes/header.html — Navegación principal con sticky header
     Grupo Scout Nyeri (Alicante)
     ============================================================ -->
<header class="site-header" id="site-header">
  <nav class="navbar" role="navigation" aria-label="Navegación principal">
    <div class="container navbar__inner">

      <!-- Logo y nombre del grupo -->
      <a href="{{ '/' | relative_url }}" class="navbar__brand" aria-label="Inicio Grupo Scout Nyeri">
        <img
          src="{{ '/assets/img/logo-transparente.png' | relative_url }}"
          alt="Logo Grupo Scout Nyeri"
          class="navbar__logo"
          width="50"
          height="50"
          loading="lazy"
        >
        <span class="navbar__name">Grupo Scout <strong>Nyeri</strong></span>
      </a>

      <!-- Menú principal (escritorio) -->
      <ul class="navbar__menu" id="navbar-menu" role="list">
        <li>
          <a href="{{ '/' | relative_url }}" class="navbar__link {% if page.url == '/' %}navbar__link--active{% endif %}">
            Inicio
          </a>
        </li>
        <li>
          <a href="{{ '/el-grupo/' | relative_url }}" class="navbar__link {% if page.url == '/el-grupo/' %}navbar__link--active{% endif %}">
            El Grupo
          </a>
        </li>

        <!-- Dropdown Ramas -->
        <li class="navbar__dropdown">
          <button class="navbar__link navbar__dropdown-toggle" aria-expanded="false" aria-haspopup="true">
            Ramas <span class="navbar__arrow" aria-hidden="true">▾</span>
          </button>
          <ul class="navbar__submenu" role="list">
            <li>
              <a href="{{ '/manada/' | relative_url }}" class="navbar__sublink navbar__sublink--manada">
                🐺 Manada <span class="age-badge">(7-11 años)</span>
              </a>
            </li>
            <li>
              <a href="{{ '/tropa/' | relative_url }}" class="navbar__sublink navbar__sublink--tropa">
                🌲 Tropa <span class="age-badge">(11-14 años)</span>
              </a>
            </li>
            <li>
              <a href="{{ '/pioneros/' | relative_url }}" class="navbar__sublink navbar__sublink--pioneros">
                🔥 Pioneros <span class="age-badge">(14-17 años)</span>
              </a>
            </li>
            <li>
              <a href="{{ '/rovers/' | relative_url }}" class="navbar__sublink navbar__sublink--rovers">
                ⚜️ Rovers <span class="age-badge">(17-20 años)</span>
              </a>
            </li>
          </ul>
        </li>

        <li>
          <a href="{{ '/blog/' | relative_url }}" class="navbar__link {% if page.url contains '/blog' %}navbar__link--active{% endif %}">
            Blog
          </a>
        </li>

        <li>
          <a href="{{ '/area-del-grupo/' | relative_url }}" class="navbar__link navbar__link--area {% if page.url contains '/area-del-grupo' or page.url contains '/login' or page.url contains '/admin' %}navbar__link--active{% endif %}">
            🔒 Área del Grupo
          </a>
        </li>
        <li>
          <a href="{{ '/contacto/' | relative_url }}" class="navbar__link navbar__link--cta {% if page.url == '/contacto/' %}navbar__link--active{% endif %}">
            ¡Únete!
          </a>
        </li>
      </ul>
      
      <!-- Selector de tema (Modo Oscuro/Claro) -->
      <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema">
        <svg class="theme-toggle__icon theme-toggle__icon--sun" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.95 16.95l.707.707M7.05 7.05l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
      </button>

      <!-- Botón hamburguesa (móvil) -->
      <button
        class="navbar__hamburger"
        id="hamburger-btn"
        aria-label="Abrir menú"
        aria-expanded="false"
        aria-controls="navbar-menu"
      >
        <span class="hamburger__line"></span>
        <span class="hamburger__line"></span>
        <span class="hamburger__line"></span>
      </button>

    </div>
  </nav>
</header>
