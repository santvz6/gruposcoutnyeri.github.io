<!-- ============================================================
     _includes/cookie-banner.html — Consentimiento de Cookies
     ============================================================ -->
<div id="cookie-banner" class="cookie-banner" style="display: none;">
  <div class="cookie-banner__container">
    <div class="cookie-banner__content">
      <p class="cookie-banner__text">
        🍪 Utilizamos cookies para mejorar tu experiencia y analizar el tráfico. 
        Al seguir navegando, aceptas nuestra <a href="{{ '/cookies/' | relative_url }}">política de cookies</a>.
      </p>
    </div>
    <div class="cookie-banner__actions">
      <button id="accept-cookies" class="cookie-banner__btn">Entendido</button>
    </div>
  </div>
</div>

<style>
  .cookie-banner {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--color-dark, #1a1a1a);
    color: white;
    padding: 1rem 0;
    z-index: 9999;
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
  }

  .cookie-banner__container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
  }

  .cookie-banner__text {
    margin: 0;
    font-size: 0.9rem;
    line-height: 1.5;
    opacity: 0.9;
  }

  .cookie-banner__text a {
    color: white;
    text-decoration: underline;
    font-weight: 700;
  }

  .cookie-banner__btn {
    background: var(--color-primary, #2e7d32);
    color: white;
    border: none;
    padding: 0.6rem 1.5rem;
    border-radius: 6px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .cookie-banner__btn:hover {
    background: var(--color-primary-dark, #1b5e20);
  }

  @media (max-width: 600px) {
    .cookie-banner__container {
      flex-direction: column;
      gap: 1rem;
      text-align: center;
    }
    .cookie-banner__btn {
      width: 100%;
    }
  }
</style>

<script>
  (function() {
    const banner = document.getElementById('cookie-banner');
    const acceptBtn = document.getElementById('accept-cookies');
    const cookieName = 'gsnyeri_cookies_accepted';

    // Comprobar si ya se aceptó
    if (!localStorage.getItem(cookieName)) {
      banner.style.display = 'block';
    }

    acceptBtn.addEventListener('click', function() {
      localStorage.setItem(cookieName, 'true');
      banner.style.display = 'none';
    });
  })();
</script>
