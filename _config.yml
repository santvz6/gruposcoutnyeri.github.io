# ============================================================
# Configuración principal de Jekyll — Grupo Scout Nyeri
# ============================================================

# Información del sitio
title: "Grupo Scout Nyeri"
description: "Más cerca de Nyeri, más cerca del cielo. Grupo Scout de San Vicente del Raspeig formando jóvenes en valores de servicio y naturaleza."
author: "Grupo Scout Nyeri"
email: "contacto.gsnyeri@gmail.com"
baseurl: ""
url: "https://gruposcoutnyeri.github.io"

# Localización
lang: "es"
timezone: "Europe/Madrid"

# Construcción
markdown: kramdown
highlighter: rouge
theme: null

# Permalink para posts del blog
permalink: /blog/:year/:month/:day/:title/

# Exclusiones del build
exclude:
  - docs/
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - .git/
  - .gitignore

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Paginación del blog
paginate: 6
paginate_path: "/blog/page:num/"

# Configuración de colecciones
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Grupo Scout Nyeri"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

